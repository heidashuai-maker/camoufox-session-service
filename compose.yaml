services:
  camoufox-session-service:
    build: .
    image: camoufox-session-service:local
    restart: unless-stopped
    init: true
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - path: .env
        required: false
    shm_size: 1gb
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"
